<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overbyte Dynamics</title>

<style>
  body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0f19;
    color:#e6edf3;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
  }

  .container {
    text-align:center;
    width:90%;
    max-width:700px;
  }

  h1 {
    font-size:2.8rem;
    color:#38bdf8;
    margin-bottom:10px;
  }

  p {
    color:#8b949e;
    margin-bottom:25px;
  }

  /* BUTTONS */
  .buttons {
    margin-bottom:30px;
  }

  .buttons a {
    display:inline-block;
    margin:6px;
    padding:10px 18px;
    background:#1f2937;
    color:#38bdf8;
    border-radius:10px;
    text-decoration:none;
    transition:0.2s;
    font-weight:500;
  }

  .buttons a:hover {
    background:#2563eb;
    color:white;
    transform:translateY(-2px);
  }

  /* NEWS */
  .news {
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-bottom:25px;
    text-align:left;
  }

  .news h2 {
    text-align:center;
    color:#38bdf8;
    margin-bottom:10px;
  }

  .news p {
    margin:5px 0;
    color:#e6edf3;
  }

  /* DISCORD */
  iframe {
    width:100%;
    max-width:350px;
    height:420px;
    border:none;
    border-radius:12px;
    margin-top:10px;
  }

  footer {
    margin-top:20px;
    font-size:0.8rem;
    color:#6b7280;
  }

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <h1>Overbyte Dynamics</h1>
  <p>Independent Software & Interactive Development Studio</p>

  <!-- BUTTONS -->
  <div class="buttons">
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
    <a href="https://discord.gg/YOUR_INVITE" target="_blank">Discord</a>
  </div>

  <!-- NEWS -->
  <div class="news">
    <h2>News & Updates</h2>
    <p>• Website redesign launched (Canva-style UI)</p>
    <p>• Discord Widget integration added</p>
    <p>• Studio branding Overbyte Dynamics created</p>
  </div>

  <!-- DISCORD WIDGET -->
  <iframe 
    src="https://discord.com/widget?id=1376217381189193809&theme=dark"
    allowtransparency="true"
    sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
  </iframe>

  <!-- FOOTER -->
  <footer>
    © 2026 Overbyte Dynamics. All rights reserved.
  </footer>

</div>

</body>
</html>
