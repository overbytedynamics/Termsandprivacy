<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overbyte Dynamics</title>

<style>
body {
  margin:0;
  background:#0b0f19;
  color:#e6edf3;
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* Canva-style big centered card */
.card {
  width:90%;
  max-width:800px;
  background:#111827;
  padding:60px 40px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* Title like Canva headline */
h1 {
  font-size:3.2rem;
  color:#38bdf8;
  margin-bottom:10px;
}

.subtitle {
  color:#8b949e;
  font-size:1.1rem;
  margin-bottom:35px;
}

/* Buttons like Canva blocks */
.buttons {
  margin-bottom:35px;
}

.buttons a {
  display:inline-block;
  margin:8px;
  padding:12px 22px;
  background:#1f2937;
  color:#38bdf8;
  border-radius:12px;
  text-decoration:none;
  transition:0.2s;
}

.buttons a:hover {
  background:#2563eb;
  color:white;
  transform:scale(1.05);
}

/* News block */
.news {
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  text-align:left;
  margin-bottom:30px;
}

.news h2 {
  text-align:center;
  color:#38bdf8;
  margin-bottom:10px;
}

/* Discord */
iframe {
  width:100%;
  max-width:350px;
  height:420px;
  border:none;
  border-radius:12px;
  margin-top:15px;
}

footer {
  margin-top:20px;
  font-size:0.8rem;
  color:#6b7280;
}

</style>
</head>

<body>

<div class="card">

  <h1>Overbyte Dynamics</h1>
  <div class="subtitle">Independent Software & Interactive Development Studio</div>

  <!-- BUTTONS -->
  <div class="buttons">
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
    <a href="https://discord.gg/YOUR_INVITE" target="_blank">Discord</a>
  </div>

  <!-- NEWS -->
  <div class="news">
    <h2>News & Updates</h2>
    <p>• Studio identity redesigned</p>
    <p>• Discord integration added</p>
    <p>• GitHub Pages deployment active</p>
  </div>

  <!-- DISCORD -->
  <iframe 
    src="https://discord.com/widget?id=1376217381189193809&theme=dark"
    sandbox="allow-popups allow-same-origin allow-scripts">
  </iframe>

  <footer>
    © 2026 Overbyte Dynamics
  </footer>

</div>

</body>
</html>
